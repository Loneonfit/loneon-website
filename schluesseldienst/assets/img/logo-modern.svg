<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="AS – Schuh und Schlüsseldienst: Qualität seit 1995">
  <!-- Moderne Neuzeichnung des Original-Logos von 1995 (Schlüssel auf rotem Quadrat) -->
  <rect width="240" height="240" rx="54" fill="#1D5C7C"/>
  <g fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- Schlüsselkopf -->
    <circle cx="82" cy="82" r="27"/>
    <!-- Schaft -->
    <path d="M102 102 L168 168"/>
    <!-- Bart (zwei Zähne) -->
    <path d="M141 141 L127 155"/>
    <path d="M168 168 L152 184"/>
  </g>
  <!-- Messing-Akzent (ehemals roter Punkt im Original) -->
  <circle cx="82" cy="82" r="8.5" fill="#C4A468"/>
  <text x="120" y="212" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="16.5" font-weight="600" letter-spacing="1.6"
        fill="#FFFFFF" fill-opacity="0.92">QUALITÄT SEIT 1995</text>
</svg>
